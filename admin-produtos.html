<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🐾 PetShop</a>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="admin-produtos.html">Produtos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="admin-usuarios.html">Usuários</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="sair()">Sair</a>
                </li>
            </ul>
        </div>
    </nav>
    <div class="container mt-5 pt-4">
        <h4 class="mt-4 mb-4">📦 Cadastro de Produtos</h4>
        <div id="mensagem" class="alert d-none" role="alert"></div>
        <div class="card shadow-sm p-4 mb-5">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nome</label>
                    <input type="text" class="form-control" id="nome" placeholder="Nome do produto">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Categoria</label>
                    <select class="form-select" id="categoria">
                        <option value="">Selecione...</option>
                        <option value="Alimentação">Alimentação</option>
                        <option value="Higiene">Higiene</option>
                        <option value="Brinquedos">Brinquedos</option>
                        <option value="Acessórios">Acessórios</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Preço</label>
                    <input type="number" class="form-control" id="preco" placeholder="0.00" min="0" step="0.01">
                </div>
                <div class="col-md-8">
                    <label class="form-label">URL da Imagem</label>
                    <input type="text" class="form-control" id="imagemUrl" placeholder="https://...">
                </div>
                <div class="col-12">
                    <label class="form-label">Descrição</label>
                    <textarea class="form-control" id="descricao" rows="3" placeholder="Descrição do produto"></textarea>
                </div>
                <div class="col-12">
                    <button onclick="salvarProduto()" class="btn btn-primary">Salvar Produto</button>
                </div>
            </div>
        </div>
        <h5 class="mb-3">Produtos Cadastrados</h5>
        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle">
                <thead class="table-primary">
                    <tr>
                        <th>Nome</th>
                        <th>Categoria</th>
                        <th>Preço</th>
                    </tr>
                </thead>
                <tbody id="tabelaProdutos"></tbody>
            </table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/pouchdb@8.0.1/dist/pouchdb.min.js"></script>
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin-produtos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
